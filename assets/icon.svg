<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Свод листов Excel: стопка листов, собирающаяся в один. Палитра Excel. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21A366"/>
      <stop offset="1" stop-color="#0B5C2E"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#149150"/>
      <stop offset="1" stop-color="#107C41"/>
    </linearGradient>
  </defs>

  <!-- фон -->
  <rect x="16" y="16" width="224" height="224" rx="44" fill="url(#bg)"/>

  <!-- стопка листов позади: «многие файлы» -->
  <rect x="88" y="44" width="128" height="112" rx="12" fill="#FFFFFF" opacity="0.28"/>
  <rect x="76" y="58" width="128" height="112" rx="12" fill="#FFFFFF" opacity="0.5"/>

  <!-- итоговый лист -->
  <rect x="64" y="72" width="128" height="112" rx="12" fill="#FFFFFF"/>
  <path d="M64 84a12 12 0 0 1 12-12h104a12 12 0 0 1 12 12v18H64z" fill="url(#head)"/>

  <!-- сетка таблицы -->
  <g stroke="#9AC8AC" stroke-width="4" stroke-linecap="round">
    <line x1="70" y1="129" x2="186" y2="129"/>
    <line x1="70" y1="156" x2="186" y2="156"/>
    <line x1="128" y1="108" x2="128" y2="178"/>
  </g>
</svg>
