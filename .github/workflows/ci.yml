# Сборка через dotnet SDK (.NET Framework 4.8 target) + юнит-тесты + смоук GUI.
# Интеграционные тесты (tests/verify*.ps1) требуют установленные Office/Excel/Word
# и выполняются только локально: tests\run_all.cmd.
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # релиз собирается и подписывается локально (tools\make_release.ps1)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Сборка приложения
        shell: cmd
        run: call build.cmd

      - name: Юнит-тесты
        shell: cmd
        run: call tests\build_tests.cmd

      - name: Смоук-тест GUI (создание окон без показа)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath .\dist\iwoHelperDesktop.exe -ArgumentList '--selftest' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Host "selftest exit=$($p.ExitCode)"; exit 1 }

      - name: Проверка вшитого PdfSharp
        shell: pwsh
        run: |
          $p = Start-Process -FilePath .\dist\iwoHelperDesktop.exe -ArgumentList '--pdfcheck' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Host "pdfcheck exit=$($p.ExitCode)"; exit 1 }

      - name: Проверка вшитого PdfPig (извлечение текста born-digital PDF)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath .\dist\iwoHelperDesktop.exe -ArgumentList '--pdftextcheck' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Host "pdftextcheck exit=$($p.ExitCode)"; exit 1 }

      - name: Чистый выход после рендера миниатюр (WinRT)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath .\dist\iwoHelperDesktop.exe -ArgumentList '--thumbcheck' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Host "thumbcheck exit=$($p.ExitCode)"; exit 1 }

      - name: Ghostscript и Inno Setup (сжатие и установщик)
        shell: pwsh
        run: |
          choco install ghostscript --no-progress -y
          choco install innosetup --no-progress -y

      - name: Проверка сжатия PDF (Ghostscript round-trip)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath .\dist\iwoHelperDesktop.exe -ArgumentList '--gscheck' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Host "gscheck exit=$($p.ExitCode)"; exit 1 }

      - name: Подготовка Ghostscript для установщика
        shell: pwsh
        run: .\tools\stage_gs.ps1

      - name: Сборка установщика (валидация .iss)
        shell: pwsh
        run: |
          $iscc = Get-ChildItem "$env:ProgramFiles","${env:ProgramFiles(x86)}" -Directory -Filter 'Inno Setup *' -ErrorAction SilentlyContinue |
            ForEach-Object { Join-Path $_.FullName 'ISCC.exe' } | Where-Object { Test-Path $_ } |
            Sort-Object -Descending | Select-Object -First 1
          if (-not $iscc) { Write-Host 'ISCC.exe не найден'; exit 1 }
          & $iscc /DAppVersion=ci .\installer\iwoHelperDesktop.iss
          if ($LASTEXITCODE -ne 0) { Write-Host "iscc exit=$LASTEXITCODE"; exit 1 }

      - name: Артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: iwoHelperDesktop
          path: dist/iwoHelperDesktop.exe

      - name: Артефакт установщика (без подписи — подпись локально)
        uses: actions/upload-artifact@v4
        with:
          name: iwoHelperDesktop-setup
          path: dist/iwoHelperDesktop-setup-*.exe

      # Релизы на GitHub создаются ЛОКАЛЬНО (tools\make_release.ps1): оба артефакта
      # подписываются самоподписанным сертификатом, который есть только на машине
      # мейнтейнера. CI лишь собирает, тестирует и валидирует установщик.
